<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>19.09.2026</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="grain" aria-hidden="true"></div>

      <header class="system-bar" aria-hidden="true">
        <span class="system-time">09:19</span>
        <div class="system-icons"><i></i><i></i><i></i></div>
      </header>

      <div class="journey-progress" aria-hidden="true"><span></span></div>
      <button class="sound-toggle" type="button" aria-label="Увімкнути звук" aria-pressed="false">
        <span class="sound-icon"><b></b><b></b><b></b></span>
      </button>

      <section id="stage" class="stage" aria-label="Інтерактивна подорож"></section>
    </main>

    <div class="desktop-note">
      <div class="desktop-note__phone">↕</div>
      <p>Цю подорож краще<br />відкрити на телефоні.</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
